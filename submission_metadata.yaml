methodology_summary: >
  Two-stage pipeline: hybrid retrieval (dense embeddings via BGE-small +
  BM25, fused with RRF) to narrow 100K candidates to a shortlist, followed
  by a rule-based recruiter-intelligence scorer that applies JD-calibrated
  weights and multiplicative modifiers for disqualifiers, behavioral
  availability, and honeypot detection. Explanations are generated
  deterministically from the same feature values that produced the score —
  no LLM calls at ranking time.
